<!DOCTYPE html>
<html>
<head>
    <title>Upload Report</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="bg-dark text-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">📄 Upload Medical Report</h2>

    <div class="card p-4 bg-secondary">

       <form action="/preview" method="post" enctype="multipart/form-data">

            <div class="mb-3">
                <label>Select Disease</label>
                <select name="disease" class="form-select">
                    <option value="diabetes">Diabetes</option>
                    <option value="heart">Heart Disease</option>
                    <option value="kidney">Kidney Disease</option>
                </select>
            </div>

            <div class="mb-3">
                <label>Upload PDF</label>
                <input type="file" name="file" class="form-control" accept=".pdf" required>
            </div>

            <button class="btn btn-primary w-100">🔍 Analyze</button>

        </form>

    </div>

</div>

</body>
</html>
