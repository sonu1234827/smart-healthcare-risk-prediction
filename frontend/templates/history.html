<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>History</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body class="bg-dark text-light">

<div class="container py-5">

    <!-- TITLE -->
    <h1 class="text-center mb-5">
        📜 Prediction History
    </h1>

    <!-- HISTORY TABLE -->
    <div class="card bg-secondary border-0 shadow-lg p-4">

        <table class="table table-dark table-striped table-hover">

            <thead>

                <tr>

                    <th>Disease</th>
                    <th>Risk Probability</th>
                    <th>Prediction</th>

                </tr>

            </thead>

            <tbody>

                {% for item in history %}

                <tr>

                    <!-- item[0] = disease -->
                    <td>
                        {{ item[0] }}
                    </td>

                    <!-- item[1] = probability -->
                    <td>
                        {{ (item[1] * 100)|round(2) }}%
                    </td>

                    <!-- item[2] = prediction -->
                    <td>

                        {% if item[2] == 1 %}

                            <span class="badge bg-danger">
                                High Risk
                            </span>

                        {% else %}

                            <span class="badge bg-success">
                                Low Risk
                            </span>

                        {% endif %}

                    </td>

                </tr>

                {% endfor %}

            </tbody>

        </table>

    </div>

    <!-- BUTTON -->
    <div class="text-center mt-4">

        <a href="/dashboard"
           class="btn btn-light btn-lg">

            🏠 Back to Dashboard

        </a>

    </div>

</div>

</body>
</html>
